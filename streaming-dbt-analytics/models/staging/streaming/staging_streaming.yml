version: 2

models:
  - name: stg_streaming__users
    columns:
      - name: user_id
        tests: [not_null, unique]
      - name: account_status
        tests:
          - accepted_values:
              values: ['active', 'paused', 'cancelled', 'suspended', 'unknown']
  - name: stg_streaming__subscriptions
    columns:
      - name: subscription_id
        tests: [not_null, unique]
      - name: user_id
        tests:
          - relationships:
              to: ref('stg_streaming__users')
              field: user_id
  - name: stg_streaming__playback_events
    columns:
      - name: event_id
        tests: [not_null, unique]
      - name: session_id
        tests:
          - relationships:
              to: ref('stg_streaming__playback_sessions')
              field: session_id
  - name: stg_streaming__payments
    columns:
      - name: payment_id
        tests: [not_null, unique]
      - name: amount_usd
        tests:
          - dbt_utils.accepted_range:
              min_value: -1000
              max_value: 500
